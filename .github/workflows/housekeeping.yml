name: Housekeeping

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  housekeeping:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    uses: banua-coder/banua-coder-workflow/.github/workflows/housekeeping.yml@main
